<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Hit Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--color-bg); }
  .admin-wrap { max-width: 1040px; margin: 0 auto; padding: 48px 24px 80px; }
  @media (max-width: 560px) {
    .admin-wrap { padding: 32px 16px 60px; }
    .login-box { margin: 60px 16px; }
  }
  .admin-header { display:flex; justify-content: space-between; align-items:center; margin-bottom: 28px; flex-wrap: wrap; gap:12px; }
  .login-box { max-width: 360px; margin: 90px auto; background: var(--color-panel); border: 1px solid var(--color-line); border-radius: 6px; padding: 28px; }
  .login-box h2 { font-size: 22px; margin-bottom: 6px; }
  .login-box p { font-size: 13.5px; margin-bottom: 18px; }
  .login-box input { width:100%; padding: 11px 12px; border:1.5px solid var(--color-line); border-radius: 4px; font-family: var(--font-body); margin-bottom: 12px; }
  .login-box .btn { width: 100%; justify-content: center; }
  .login-error { color: var(--color-hazard); font-family: var(--font-mono); font-size: 12.5px; margin-top: 8px; display:none; }
  table { width: 100%; min-width: 720px; border-collapse: collapse; background: var(--color-panel); border: 1px solid var(--color-line); }
  .table-scroll { overflow-x: auto; border-radius: 6px; -webkit-overflow-scrolling: touch; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--color-line); font-size: 13.5px; vertical-align: top; }
  th { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink-soft); background: var(--color-bg); }
  tr:last-child td { border-bottom: none; }
  .badge { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; border: 1px solid var(--color-line); }
  .badge-new { background: #FFF4D6; border-color: #E9C46A; }
  .badge-contacted { background: #E4F1F5; border-color: #9CC7D6; }
  .badge-closed { background: #E9F5EC; border-color: #bfe4c8; }
  select.status-select { font-family: var(--font-mono); font-size: 12px; padding: 5px 6px; border-radius: 4px; border: 1px solid var(--color-line); }
  .empty-state { text-align:center; padding: 60px 20px; color: var(--color-ink-soft); font-family: var(--font-mono); font-size: 13px; }
  #logoutBtn { font-size: 12px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Staff Login</h2>
    <p>Enter the admin password to view chemical requests.</p>
    <input type="password" id="passwordInput" placeholder="Admin password">
    <button class="btn btn-primary" id="loginBtn">Log In</button>
    <div class="login-error" id="loginError">Incorrect password.</div>
  </div>
</div>

<div id="adminScreen" style="display:none;">
  <div class="admin-wrap">
    <div class="admin-header">
      <div>
        <span class="eyebrow">Hit Enterprise</span>
        <h2 style="margin-top:6px;">Chemical Requests</h2>
      </div>
      <button class="btn btn-ghost" id="logoutBtn">Log Out</button>
    </div>
    <div id="tableWrap"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
